version: '3.9'

services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15

  redis:
    image: redis:7

  celery:
    build: .
    command: celery -A config worker -l info
    depends_on:
      - redis